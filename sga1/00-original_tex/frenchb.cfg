%%% frenchb.cfg: configuration file for frenchb.ldf
%%% Daniel Flipo <Daniel.Flipo@univ-lille1.fr>

% If you want to customize frenchb, please *do not* hack into the
% code, copy this file into babel's directory (that's where
% frenchb.ldf lies) and customize it as you like. 


% Activation, desactivation (ACL, 9 dec. 1998)
\addto\extrasfrenchb{%
  \catcode`\;=13
  \catcode`\:=13
  \catcode`\?=13
  \catcode`\!=13
}

\addto\noextrasfrenchb{%
  \catcode`\;=12
  \catcode`\:=12
  \catcode`\?=12
  \catcode`\!=12
}

% Uncomment the following line if you dislike frenchb automatically
% adding a space before French double punctuation (see frenchb.dtx
% for more information).

% \NoAutoSpaceBeforeFDP


% Uncomment these lines if you prefer the names \numero and \Numero
% (as in french.sty) to \no and \No.

\let\numero\no
\let\Numero\No

% Uncomment the following lines if you want to substitute `\bsc' to
% either (or both) of french.sty macros `\fsc' and `\lsc'.

\let\fsc=\bsc
\let\lsc=\bsc

% Uncomment the following line if you want to substitute `\up' to
% french.sty macro `\fup'.

\DeclareRobustCommand*{\fup}[1]{\up{#1}}

% Uncomment the following lines if you intend to use  commands |\french|
% and |\english| to switch between languages, as in |french.sty|.

\def\french{\leavevmode\selectlanguage{french}}
\def\english{\leavevmode\selectlanguage{english}}

% Uncomment the following lines if you intend to use the command
% \AllTeX to refer to all flavours of \TeX, (this command has been
% made popular by french.sty.

\DeclareRobustCommand*{\AllTeX}{%
                (L\kern-.36em\raise.3ex\hbox{\sc a}\kern-.15em)%
                   T\kern-.1667em\lower.7ex\hbox{E}\kern-.125emX}

% For Unix and Windows users *ONLY*:
% uncomment the following lines if you want to use latin-1
% characters Į and Č to produce French quotation marks: 
% typing either Į guillemets Č or ĮguillemetsČ will produce 
% French quotation marks with correct (unbreakable) spacing.

\catcode`\Į=12
\catcode`\Č=12
\initiate@active@char{Į}
\initiate@active@char{Č}
\AtBeginDocument{%
\defĮ{\og\ignorespaces}%
\defČ{{\fg}}%
\bbl@nonfrenchlistspacing
}

\endinput

