<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SGA 3</title>
<link rel="icon" href="data:,">
<style>
:root {
  --accent: #7a1f1f;
  --bg: #fbfaf7;
  --panel: #fff;
  --soft: #f1efe9;
  --border: #ddd9cf;
  --text: #1d1d1b;
  --muted: #6b675e;
  --link: #1a5276;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
  line-height: 1.55;
}

a {
  color: var(--link);
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  background: var(--accent);
  color: #fff;
  padding: .65rem 1rem;
  box-shadow: 0 1px 4px rgba(0, 0, 0, .2);
}

.topbar h1 {
  margin: 0;
  font-size: 1.05rem;
  font-weight: 600;
}

.topbar a {
  color: #fff;
  text-decoration: none;
}

main {
  width: min(1180px, calc(100% - 2rem));
  margin: 0 auto;
  padding: 2rem 0 4rem;
}

.summary {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 1.5rem;
  align-items: end;
  border-bottom: 2px solid var(--border);
  padding-bottom: 1.2rem;
}

.summary h2 {
  margin: 0;
  color: var(--accent);
  font-size: 2rem;
  line-height: 1.15;
}

.summary p {
  margin: .45rem 0 0;
  color: var(--muted);
}

.open-reader {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 2.25rem;
  padding: .35rem .85rem;
  border: 1px solid var(--accent);
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: .55rem;
  margin: 1rem 0 1.5rem;
}

.meta span {
  display: inline-flex;
  align-items: center;
  min-height: 1.7rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--soft);
  padding: .15rem .55rem;
  color: var(--muted);
  font-size: .92rem;
}

.toc {
  display: grid;
  gap: .85rem;
}

.chapter {
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--panel);
  padding: .9rem 1rem;
}

.chapter-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 1rem;
  align-items: start;
}

.chapter h3 {
  margin: 0;
  font-size: 1.1rem;
  line-height: 1.35;
}

.chapter h3 a {
  color: var(--text);
  text-decoration: none;
}

.chapter h3 a:hover {
  color: var(--accent);
  text-decoration: underline;
}

.chapter-stats {
  color: var(--muted);
  font-size: .9rem;
  white-space: nowrap;
}

.pages {
  display: flex;
  flex-wrap: wrap;
  gap: .35rem;
  margin-top: .75rem;
}

.pages a {
  display: inline-flex;
  align-items: center;
  min-height: 1.65rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--soft);
  padding: .08rem .45rem;
  text-decoration: none;
  font-size: .85rem;
}

.pages a:hover {
  border-color: var(--accent);
}

.error {
  border-left: 3px solid var(--accent);
  background: #fff;
  padding: .75rem .9rem;
}

@media (max-width: 720px) {
  .summary,
  .chapter-head {
    grid-template-columns: 1fr;
  }

  .open-reader,
  .chapter-stats {
    justify-self: start;
  }
}
</style>
</head>
<body>
<header class="topbar">
  <h1 id="book-title">SGA 3</h1>
  <a href="paper.html">Lecteur</a>
</header>
<main>
  <section class="summary" aria-labelledby="page-title">
    <div>
      <h2 id="page-title">SGA 3</h2>
      <p id="subtitle">Chargement du contenu disponible...</p>
    </div>
    <a class="open-reader" href="paper.html">Ouvrir le lecteur</a>
  </section>
  <div class="meta" id="meta"></div>
  <section class="toc" id="toc" aria-label="Table des matières"></section>
</main>
<script>
(function () {
  'use strict';

  var state = {
    config: null,
    manifest: null,
    chapters: []
  };

  var elBookTitle = document.getElementById('book-title');
  var elPageTitle = document.getElementById('page-title');
  var elSubtitle = document.getElementById('subtitle');
  var elMeta = document.getElementById('meta');
  var elToc = document.getElementById('toc');

  function fetchJSON(url) {
    return fetch(url).then(function (response) {
      if (!response.ok) throw new Error('HTTP ' + response.status + ' for ' + url);
      return response.json();
    });
  }

  function chapterUrl(lang, chapterId) {
    return 'data/' + encodeURIComponent(lang) + '/chapters/' +
      encodeURIComponent(chapterId) + '.json';
  }

  function loadChapter(lang, entry) {
    return fetchJSON(chapterUrl(lang, entry.page_id)).then(function (chapter) {
      return {
        entry: entry,
        id: chapter.chapter_id || entry.page_id,
        title: chapter.title || entry.title || entry.page_id,
        number: chapter.number || entry.chapter_number || null,
        pages: chapter.pages || []
      };
    });
  }

  function availableTargetLangs(config) {
    var rightLangs = config.rightLangs || [];
    return Promise.all(rightLangs.map(function (lang) {
      return fetch('data/' + encodeURIComponent(lang) + '/manifest.json')
        .then(function (response) { return response.ok ? lang : null; })
        .catch(function () { return null; });
    })).then(function (langs) {
      return langs.filter(Boolean);
    });
  }

  function textForCount(count, one, many) {
    return count + ' ' + (count === 1 ? one : many);
  }

  function setChrome(config, chapters, targetLangs) {
    var base = config.baseLang || 'fr';
    var language = (config.languages && config.languages[base]) || {};
    var title = language.bookTitle || language.pageTitle || 'SGA 3';
    var pageTitle = language.pageTitle || title;
    var pageCount = chapters.reduce(function (sum, chapter) {
      return sum + chapter.pages.length;
    }, 0);

    document.documentElement.lang = base;
    document.title = pageTitle;
    elBookTitle.textContent = title;
    elPageTitle.textContent = pageTitle;
    elSubtitle.textContent = 'Contenu actuellement disponible dans data/' + base + '.';

    elMeta.innerHTML = '';
    [
      textForCount(chapters.length, 'entrée', 'entrées'),
      textForCount(pageCount, 'page', 'pages'),
      'Langue source : ' + ((language && language.label) || base.toUpperCase()),
      targetLangs.length
        ? 'Traductions : ' + targetLangs.map(function (lang) {
            return ((config.languages && config.languages[lang] &&
              config.languages[lang].label) || lang.toUpperCase());
          }).join(', ')
        : 'Aucune traduction disponible'
    ].forEach(function (label) {
      var item = document.createElement('span');
      item.textContent = label;
      elMeta.appendChild(item);
    });
  }

  function pageHref(pageId) {
    return 'paper.html#' + encodeURIComponent(pageId);
  }

  function chapterHref(chapter) {
    return pageHref(chapter.entry.page_id || (chapter.pages[0] && chapter.pages[0].id));
  }

  function render(chapters) {
    var frag = document.createDocumentFragment();

    chapters.forEach(function (chapter) {
      var article = document.createElement('article');
      article.className = 'chapter';

      var head = document.createElement('div');
      head.className = 'chapter-head';

      var title = document.createElement('h3');
      var link = document.createElement('a');
      link.href = chapterHref(chapter);
      link.textContent = chapter.title;
      title.appendChild(link);

      var stats = document.createElement('div');
      stats.className = 'chapter-stats';
      stats.textContent = textForCount(chapter.pages.length, 'page', 'pages');

      head.appendChild(title);
      head.appendChild(stats);
      article.appendChild(head);

      if (chapter.pages.length > 1) {
        var pages = document.createElement('div');
        pages.className = 'pages';
        chapter.pages.forEach(function (page) {
          var pageLink = document.createElement('a');
          pageLink.href = pageHref(page.id);
          pageLink.textContent = page.title || page.id;
          pages.appendChild(pageLink);
        });
        article.appendChild(pages);
      }

      frag.appendChild(article);
    });

    elToc.innerHTML = '';
    elToc.appendChild(frag);
  }

  function showError(error) {
    elSubtitle.textContent = 'Impossible de charger le contenu.';
    elToc.innerHTML = '<p class="error">' +
      error.message +
      '<br>Servez ce dossier avec un serveur HTTP pour autoriser le chargement des fichiers JSON.</p>';
  }

  fetchJSON('data/config.json')
    .then(function (config) {
      state.config = config;
      return Promise.all([
        fetchJSON('data/' + encodeURIComponent(config.baseLang || 'fr') + '/manifest.json'),
        availableTargetLangs(config)
      ]);
    })
    .then(function (result) {
      state.manifest = result[0];
      var targetLangs = result[1];
      var lang = state.config.baseLang || 'fr';
      return Promise.all((state.manifest.toc || []).map(function (entry) {
        return loadChapter(lang, entry);
      })).then(function (chapters) {
        state.chapters = chapters;
        setChrome(state.config, chapters, targetLangs);
        render(chapters);
      });
    })
    .catch(showError);
})();
</script>
</body>
</html>
