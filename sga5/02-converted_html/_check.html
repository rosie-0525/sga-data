<!DOCTYPE html>
<meta charset="utf-8">
<title>sga5 render sweep</title>
<pre id="out">RUNNING</pre>
<iframe id="fr" src="paper.html" style="width:1200px;height:900px"></iframe>
<script>
const out = document.getElementById('out');
const fr = document.getElementById('fr');
const lines = [];
function log(s){
  lines.push(s); out.textContent = lines.join('\n');
  fetch('/report', {method: 'POST', body: s + '\n'}).catch(() => {});
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function waitFor(cond, timeout, step=200){
  const t0 = Date.now();
  while (Date.now() - t0 < timeout){
    try { if (cond()) return true; } catch(e){}
    await sleep(step);
  }
  return false;
}

(async () => {
  await waitFor(() => fr.contentDocument && fr.contentDocument.getElementById('panes')
    && fr.contentDocument.getElementById('panes').dataset.pageId, 60000);
  const w = fr.contentWindow;
  const manifest = await (await fetch('data/fr/manifest.json')).json();
  const want = new URLSearchParams(location.search).get('chapter');
  const chapters = want ? manifest.chapters.filter(c => want.split(',').includes(c.id))
                        : manifest.chapters;
  const pids = chapters.flatMap(c => c.page_ids);
  let totalErr = 0, totalRaw = 0, totalSvg = 0;
  for (const pid of pids){
    w.location.hash = '#' + pid;
    const ok = await waitFor(() => w.document.getElementById('panes').dataset.pageId === pid, 20000);
    // let the viewer queue its typeset, then drain the MathJax promise chain
    await sleep(250);
    for (let i = 0; i < 40; i++){
      const p = w.MathJax && w.MathJax.startup && w.MathJax.startup.promise;
      if (p) { await p; }
      const before = p;
      await sleep(150);
      if (w.MathJax.startup.promise === before) break;
    }
    const panes = w.document.getElementById('panes');
    const merr = panes.querySelectorAll('mjx-merror').length;
    const svg = panes.querySelectorAll('mjx-container svg').length;
    const text = panes.textContent;
    const raw = (text.match(/\\\(|\\\[|\\xymatrix/g) || []).length;
    const blocks = panes.querySelectorAll('.cell-left').length;
    const fns = panes.querySelectorAll('#footnotes li, section.footnotes li, .footnotes li').length;
    totalErr += merr; totalRaw += raw; totalSvg += svg;
    log(`${ok ? 'ok ' : 'TIMEOUT'} ${pid}\tblocks=${blocks}\tsvg=${svg}\tmerr=${merr}\traw=${raw}\tfns=${fns}`);
    if (merr){
      panes.querySelectorAll('mjx-merror').forEach(e => log('   MERR: ' + e.getAttribute('data-mjx-error')));
    }
  }
  log(`TOTAL pages=${pids.length} svg=${totalSvg} merr=${totalErr} rawTeX=${totalRaw}`);
  log('DONE');
  document.title = 'DONE';
  await fetch('/report', {method: 'POST', body: lines.join('\n')});
})().catch(async e => {
  log('FATAL ' + (e && e.message));
  document.title = 'DONE';
  await fetch('/report', {method: 'POST', body: lines.join('\n')});
});
</script>
